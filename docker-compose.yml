services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: minicommerce
      POSTGRES_USER: minicommerce
      POSTGRES_PASSWORD: minicommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # order-api 전용 orderdb를 볼륨 최초 초기화 시 함께 생성한다(MSA S3-3b).
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minicommerce -d minicommerce"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Kafka (KRaft 모드, 단일 브로커) — order 이벤트 externalization 용
  # INTERNAL(kafka:29092): 컴포즈 네트워크 내부(backend) / EXTERNAL(localhost:9092): 호스트 접근
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # catalog + cart/review/notification + 스토어프론트 BFF 잔류 서비스(MSA S3-3b, ADR-005).
  shop-api:
    build:
      context: ./backend
      args:
        MODULE: shop-api
        PORT: "8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/minicommerce
      DATABASE_USERNAME: minicommerce
      DATABASE_PASSWORD: minicommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # catalog가 재고를 order-api 내부 API로 조회/설정(ADR-005 S3-3b, 옵션 A). 부팅 경로에서는
      # 더 이상 호출하지 않고(GH #14, SeedData 제거) 런타임 조회/설정 시에만 쓰인다.
      INVENTORY_BASE_URL: http://order-api:8081
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SUPABASE_JWKS_URL: https://wzdifkwupleogfixibiv.supabase.co/auth/v1/.well-known/jwks.json
      BFF_SECRET_KEY: ${BFF_SECRET_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    ports:
      - "18080:8080"
    # k8s resources.limits.memory의 예행연습(F6) — 이미지의 -XX:MaxRAMPercentage=75.0이 이 limit에
    # 비례해 힙을 잡는지(768MiB)를 로컬에서 상시 검증한다. CPU limit은 두지 않는다: JIT 컴파일이
    # 몰리는 부팅 구간의 burst를 막으면 기동/readiness만 느려진다(k8s에서도 CPU는 request만, G3).
    mem_limit: 1g
    # graceful shutdown 유예 계약(F4) — 앱의 timeout-per-shutdown-phase(30s)보다 길어야
    # 진행 중 요청 완료 전에 SIGKILL(compose 기본 10s)로 끊기지 않는다.
    stop_grace_period: 35s
    healthcheck:
      # actuator readiness probe(GH #15 F2) — k8s readinessProbe의 예행연습. readiness 그룹은
      # readinessState만 포함하므로(외부 의존 미포함, application.yml 주석 참고) "앱이 부팅을
      # 마치고 트래픽을 받을 수 있다"는 신호다.
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health/readiness"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    depends_on:
      # order-api는 더 이상 부팅 순서 의존이 아니다(GH #14 A6) — shop-api 부팅 중 order-api를
      # 동기 호출하던 SeedData를 제거했다. Kafka(consumer)/Redis(코드상 미사용)도 순서를 강제할
      # 필요가 없어 뺐다(GH #14 F1) — Postgres만 Flyway가 소유하는 정당한 hard dependency로 남긴다.
      postgres:
        condition: service_healthy

  # order+inventory+주문 웹계층(고객/관리자) 분리 서비스(MSA S3-3b, ADR-005). 전용 order-db.
  order-api:
    build:
      context: ./backend
      args:
        MODULE: order/order-api
        PORT: "8081"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/orderdb
      DATABASE_USERNAME: minicommerce
      DATABASE_PASSWORD: minicommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # order가 catalog를 REST로 조회(ADR-005 S2). order-api가 별도 프로세스이므로 shop-api의
      # 실제 호스트를 가리킨다.
      CATALOG_BASE_URL: http://shop-api:8080
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SUPABASE_JWKS_URL: https://wzdifkwupleogfixibiv.supabase.co/auth/v1/.well-known/jwks.json
      BFF_SECRET_KEY: ${BFF_SECRET_KEY}
      SERVER_PORT: "8081"
    ports:
      - "18081:8081"
    # F6/F4 — shop-api의 mem_limit/stop_grace_period 주석 참고.
    mem_limit: 1g
    stop_grace_period: 35s
    healthcheck:
      # actuator readiness probe(GH #15 F2) — 비즈니스 API(/internal/inventory/stocks)를 찌르던
      # 편법을 제거하고 전용 probe 엔드포인트로 교체했다.
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/health/readiness"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    depends_on:
      # Kafka(consumer)/Redis(inventory 모듈, 런타임에만 접근)는 기동을 막지 않는다(GH #14 F1) —
      # Lettuce/Kafka consumer 모두 lazy 연결이라 compose에 순서를 강제할 필요가 없다. Postgres만
      # Flyway가 스키마를 소유하는 정당한 hard dependency로 남긴다.
      postgres:
        condition: service_healthy

  # 관리자 전용 주문 API 분리 서비스(MSA S4, ADR-005). order-api와 동일한 order-db를 공유한다.
  order-admin:
    build:
      context: ./backend
      args:
        MODULE: order/order-admin
        PORT: "8082"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/orderdb
      DATABASE_USERNAME: minicommerce
      DATABASE_PASSWORD: minicommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # 지금은 admin이 catalog를 호출하지 않지만(OrderRepository 직결), order-infra의
      # CatalogProductAdapter가 전이의존으로 항상 조립되므로 호스트를 명시해 향후 지뢰를 제거한다
      # (아키텍처 리뷰 지적, MSA S4).
      CATALOG_BASE_URL: http://shop-api:8080
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SUPABASE_JWKS_URL: https://wzdifkwupleogfixibiv.supabase.co/auth/v1/.well-known/jwks.json
      BFF_SECRET_KEY: ${BFF_SECRET_KEY}
      SERVER_PORT: "8082"
    ports:
      - "18082:8082"
    # F6/F4 — shop-api의 mem_limit/stop_grace_period 주석 참고.
    mem_limit: 1g
    stop_grace_period: 35s
    healthcheck:
      # readiness probe로 교체(GH #15 F2). 이전의 /actuator/health는 DB/Redis 인디케이터를
      # 집계하므로 외부 의존 순단 시 unhealthy가 됐다 — readiness 그룹(readinessState만)은
      # F1의 독립 부팅 원칙과 일관되게 앱 자체의 준비 상태만 본다.
      test: ["CMD", "curl", "-sf", "http://localhost:8082/actuator/health/readiness"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    # depends_on 없음(GH #14 F1) — order-api healthy를 기다리던 이전 방식은 k8s에 옮길 수 없는
    # 앱간 순서 보장이었다. 이 서비스는 flyway.enabled=false라 DDL을 실행하지 않으므로 order-api와의
    # "동시 DDL 경합"은 애초에 없고, orderdb 스키마가 아직 없을 때는 Hikari
    # initialization-fail-timeout: -1(application.yml)로 풀 생성은 성공시키고 커넥션 획득
    # 시점에 재시도한다. Redis도 Lettuce lazy 연결이라 순서를 강제할 필요가 없다.

  # 재고 만료 리퍼 + 미발행 이벤트 스윕 전담 배치 서비스(MSA S4, ADR-005). 웹 엔드포인트는 없다.
  order-batch:
    build:
      context: ./backend
      args:
        MODULE: order/order-batch
        PORT: "8083"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/orderdb
      DATABASE_USERNAME: minicommerce
      DATABASE_PASSWORD: minicommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CATALOG_BASE_URL: http://shop-api:8080
      SERVER_PORT: "8083"
    # F6/F4 — shop-api의 mem_limit/stop_grace_period 주석 참고. 배치는 트래픽이 없어 limit을
    # 낮춰도 되지만(산정표: backend/doc/CONFIGURATION.md), 로컬은 검증 단순화를 위해 통일한다.
    mem_limit: 1g
    stop_grace_period: 35s
    healthcheck:
      # readiness probe로 교체(GH #15 F2, order-admin과 동일한 사유).
      test: ["CMD", "curl", "-sf", "http://localhost:8083/actuator/health/readiness"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    # depends_on 없음(GH #14 F1, order-admin과 동일한 사유) — order-api/postgres/redis/kafka
    # 전부 순서를 강제하지 않는다. orderdb 스키마 미준비는 Hikari initialization-fail-timeout: -1로,
    # Kafka(producer, IncompleteEventSweeper)/Redis(inventory, ShedLock)는 lazy 연결로 흡수한다.

  # 분산 트레이싱 백엔드(로컬 전용, GH #7). OTLP 수신 후 로컬 스토리지에 저장.
  # 4317/4318을 host에 노출해 host에서 next dev로 구동하는 BFF도 OTLP export 가능.
  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "4317:4317"
      - "4318:4318"
      - "3200:3200"

  # 로그 백엔드(로컬 전용, GH #8). Collector 없이 앱→Loki 직접 OTLP export(네이티브 수신).
  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./docker/observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  # 메트릭 백엔드(로컬 전용, GH #8). scrape 없이 OTLP push만 수신. v2.55.1에는 아직
  # --web.enable-otlp-receiver가 stable 플래그로 승격되지 않아(v3.x 대상) experimental
  # feature flag(otlp-write-receiver)로 활성화한다 — 엔드포인트는 동일하게 /api/v1/otlp/v1/metrics.
  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --enable-feature=otlp-write-receiver
    volumes:
      - ./docker/observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  # 트레이스/로그/메트릭 조회 UI(로컬 전용, GH #7/#8). Tempo/Loki/Prometheus datasource 자동 프로비저닝.
  grafana:
    image: grafana/grafana:latest
    environment:
      # 조직명을 고정해 GF_AUTH_ANONYMOUS_ORG_NAME과 항상 일치시킨다 — 미지정 시 Grafana가
      # 프로젝트 디렉토리명 기반으로 조직명을 자동 생성해(예: "Mini-Commerce Org.") 옛 기본값
      # "Main Org."를 찾는 익명 인증이 org.notFound로 실패하는 문제가 있었다.
      GF_ORGANIZATION_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3001:3000"
    volumes:
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - tempo
      - loki
      - prometheus

volumes:
  postgres-data:
  tempo-data:
  loki-data:
  prometheus-data:
