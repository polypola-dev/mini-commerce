apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      maxLines: 1000
      # 로그 한 줄 → 트레이스 이동(GH #8). OTel logback appender가 보내는 로그 본문에는 콘솔
      # 패턴([app,traceId,spanId])이 없고, trace_id/span_id는 OTLP 로그 레코드의 구조화
      # 메타데이터(structured metadata)로 별도 실린다 — 실측 확인함(regex-in-line은 매칭 안 됨).
      # 그래서 본문 정규식이 아니라 label(구조화 메타데이터 필드명) 매처를 쓴다.
      derivedFields:
        - datasourceUid: tempo
          matcherType: label
          matcherRegex: trace_id
          name: TraceID
          url: '$${__value.raw}'
          urlDisplayLabel: 'Tempo에서 트레이스 보기'
