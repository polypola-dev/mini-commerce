spring:
  application:
    name: mini-commerce-inventory-api
  # Graceful shutdown 유예 계약(F4) — 유예 30s < 컨테이너 종료 유예 35s(compose stop_grace_period,
  # k8s terminationGracePeriodSeconds). shop-api/order-api와 동일 계약.
  lifecycle:
    timeout-per-shutdown-phase: 30s
  task:
    scheduling:
      shutdown:
        # 실행 중인 리퍼(만료 예약 해제)가 있으면 종료 전에 완료를 기다린다(F4 — order-batch에서
        # 리퍼와 함께 이관된 계약). ShedLock 락도 정상 해제된다.
        await-termination: true
        await-termination-period: 25s
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/inventorydb}
    username: ${DATABASE_USERNAME:minicommerce}
    password: ${DATABASE_PASSWORD:minicommerce}
  jpa:
    hibernate:
      # inventorydb 스키마는 Flyway가 소유(GH #11 원칙), Hibernate는 validate만 수행.
      ddl-auto: validate
    open-in-view: false
  flyway:
    # inventorydb 스키마는 inventory-api가 단독 소유(GH #3). 항상 신규 DB에서 V1부터 실행되므로
    # baseline은 불필요하다(orderdb와 달리 기존 데이터 볼륨에서 전환하는 경로가 없음).
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Modulith events-kafka(ByteArrayJsonMessageConverter)가 JSON byte[]를 넘기므로 그대로 통과
      # (order-api application.yml 주석 참고 — String으로 두면 SerializationException).
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
    # order.paid/order.canceled 구독(GH #3 S4 — OrderEventKafkaConsumer). 발행측(order Modulith)이
    # JSON byte[]로 보내므로 shop-api notification 컨슈머와 동일하게 맞춘다.
    consumer:
      group-id: inventory
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
  modulith:
    # 미발행 inventory.reservation.expired의 재시도. order 쪽과 달리 별도 스위퍼를 두지 않고
    # 재시작 시 재발행으로 갈음한다 — 컨슈머(order-batch expire)가 멱등(PENDING_PAYMENT 가드)이라
    # 안전하다. 레플리카 2+ 스케일 시 스위퍼 필요성 재검토(architecture/inventory.md 부채).
    republish-outstanding-events-on-restart: true
    events:
      jdbc:
        schema-initialization:
          # event_publication 테이블은 Flyway V1이 소유(GH #11 원칙) — Modulith 자체 초기화 끔.
          enabled: false

app:
  batch:
    # 만료 리퍼(ExpiredReservationReleaser)는 이 프로세스가 소유한다(GH #3 S3 — order-batch에서
    # 이관). 다른 부팅 앱(order-*)은 inventory-core가 클래스패스에서 빠져 게이팅이 불필요해졌지만,
    # 명시적 플래그 이중 방어는 그대로 유지한다.
    enabled: true
  security:
    # 이 서비스의 웹 API는 전부 /internal이라 이 키가 유일한 앱 레이어 방어다(B3, ADR-020).
    # 호출자는 order-api(예약 사가)와 shop-api(재고 조회/설정). 콤마 구분 복수 키는 로테이션용.
    internal-api-key: ${INTERNAL_API_KEY}

server:
  port: ${SERVER_PORT:8084}
  # 롤링 업데이트 중 처리 중이던 요청 유실 방지(F4) — order-api application.yml 주석 참고.
  shutdown: graceful

# OTel 공식 스타터(GH #8) — per-signal endpoint는 경로를 자동으로 안 붙여주므로 실제 수신 경로까지
# 명시한다(order-api application.yml 주석 참고).
otel:
  service:
    name: ${OTEL_SERVICE_NAME:mini-commerce-inventory-api}
  exporter:
    otlp:
      traces:
        endpoint: ${OTLP_TRACES_ENDPOINT:http://tempo:4318/v1/traces}
      metrics:
        endpoint: ${OTLP_METRICS_ENDPOINT:http://prometheus:9090/api/v1/otlp/v1/metrics}
      logs:
        endpoint: ${OTLP_LOGS_ENDPOINT:http://loki:3100/otlp/v1/logs}
  traces:
    sampler: parentbased_always_on
  metrics:
    exporter: otlp
  logs:
    exporter: otlp

management:
  # health만 노출(GH #15 F2). readiness에 DB/Redis 인디케이터는 넣지 않는다(기본 readinessState만) —
  # 외부 의존 순단 시 연쇄 장애 방지(GH #14 F1 원칙의 연장).
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
