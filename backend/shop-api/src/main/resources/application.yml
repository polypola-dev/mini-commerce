spring:
  application:
    name: mini-commerce-backend
  # Graceful shutdown 유예 계약(F4). Spring Boot 3.4+는 server.shutdown=graceful이 기본이지만,
  # 이 값과 컨테이너 종료 유예(compose stop_grace_period, k8s terminationGracePeriodSeconds)가
  # "명시적으로" 정렬돼야 하는 계약이라 기본값에 숨기지 않고 고정한다. 유예 30s < 컨테이너
  # 유예 35s — 컨테이너가 SIGKILL을 보내기 전에 앱이 스스로 종료를 마치는 순서가 보장돼야 한다.
  lifecycle:
    timeout-per-shutdown-phase: 30s
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/minicommerce}
    username: ${DATABASE_USERNAME:minicommerce}
    password: ${DATABASE_PASSWORD:minicommerce}
  jpa:
    hibernate:
      # Flyway 도입(GH #11). 스키마 생성/변경은 Flyway 마이그레이션이 소유하고, Hibernate는
      # 엔티티 매핑과 실제 스키마의 일치만 검증한다(update → validate). event_publication은
      # JPA 엔티티가 아니라 validate 대상이 아니다.
      ddl-auto: validate
    open-in-view: false
  flyway:
    # minicommerce DB 스키마는 shop-api가 소유(GH #11). classpath:db/migration 기본 위치 사용.
    # db/seed(더미 상품 데이터)는 여기 포함하지 않는다 — local profile에서만
    # application-local.yml이 locations에 추가한다(GH #14).
    enabled: true
    # 이미 데이터가 있는 기존 볼륨에서도 전환 가능하도록 baseline 허용(clean 볼륨은 V1부터 정상 실행).
    baseline-on-migrate: true
    baseline-version: 0
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Kafka producer/consumer observation 자동계측 실험(Issue #7 Step 6) — Modulith
    # events-kafka 외부화 경로에도 trace 전파가 붙는지 확인용.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    # order 이벤트 발행(producer)은 order-api로 이관됐다(ADR-005 S3-3b) — shop-api는 이제
    # notification 컨슈머로만 Kafka를 쓴다.
    consumer:
      group-id: notification
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # producer(order-api/order-batch)가 Modulith ByteArrayJsonMessageConverter를 통해 byte[]로
      # 발행하므로, 수신측도 byte[]로 받아야 같은 컨버터가 타입 헤더 없이 선언 타입으로 역직렬화한다.
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
  modulith:
    republish-outstanding-events-on-restart: true
    events:
      jdbc:
        schema-initialization:
          # event_publication 테이블도 Flyway baseline이 소유한다(GH #11) — Modulith 자체
          # 스키마 초기화는 끈다(소유권 단일화, validate 경로와 무충돌).
          enabled: false

app:
  inventory:
    # catalog가 재고를 order-api 내부 API로 조회/설정하는 base-url(ADR-005 S3-3b). order-api가
    # 별도 프로세스이므로 그 실제 호스트(로컬 기본 8081)를 가리킨다.
    base-url: ${INVENTORY_BASE_URL:http://localhost:8081}
    stock-cache:
      # 재고 조회 폴백 캐시 TTL(D6, InventoryStockCache). 서킷이 열렸을 때 돌려줄 "마지막
      # 성공값"의 유효기간이며, 만료되면 0(품절 표시)으로 내려간다. 길게 잡으면 오래된 재고를
      # 오래 보여주고, 짧게 잡으면 장애가 길어질 때 폴백이 무력해진다 — 그 절충으로 1시간.
      ttl: ${INVENTORY_STOCK_CACHE_TTL:1h}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    jwks-url: ${SUPABASE_JWKS_URL:https://wzdifkwupleogfixibiv.supabase.co/auth/v1/.well-known/jwks.json}
    bff-secret-key: ${BFF_SECRET_KEY}
    # 서비스간 /internal 인증(B3, ADR-020). 수신(catalog의 /internal/products)과 발신
    # (InventoryClient→inventory-api) 양쪽에 쓰인다. 콤마 구분 복수 키는 무중단 로테이션용.
    internal-api-key: ${INTERNAL_API_KEY}
  supabase:
    url: ${SUPABASE_URL:https://wzdifkwupleogfixibiv.supabase.co}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}

# 서비스간 동기 REST 호출 서킷브레이커(D6). shop-api가 여는 간선은 catalog→inventory-api 하나뿐이라
# inventory 인스턴스만 정의한다.
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        # 트래픽이 적은 시간대에 호출 1~2건 실패로 서킷이 열리지 않도록 최소 호출 수를 둔다.
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        # 응답은 오는데 느린 경우도 장애로 센다 — 타임아웃(2s)까지 매달렸다가 실패하는 것보다
        # 먼저 끊는 편이 낫다. slowCallRateThreshold=100은 "전부 느릴 때만" 여는 보수적 설정이다.
        slowCallDurationThreshold: 3s
        slowCallRateThreshold: 100
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        # readiness/health에 서킷 상태를 넣지 않는다. 아래 management 주석과 같은 이유로,
        # inventory-api 순단 때문에 shop-api 전 레플리카가 동시에 LB에서 빠지면 재고 조회
        # 하나 때문에 상품 페이지 전체가 죽는 연쇄 장애가 된다. 서킷 상태는 OTel 메트릭으로만 본다.
        registerHealthIndicator: false
    instances:
      inventory:
        baseConfig: default

# OTel 공식 스타터(GH #8, 스파이크 GH #7 후속으로 정식 반영). Trace/Metric/Log 3축을 각각
# 다른 백엔드(Tempo/Prometheus/Loki)로 보내야 해서 시그널별 endpoint를 명시한다 — per-signal
# endpoint는 (공용 endpoint와 달리) 경로를 자동으로 안 붙여주므로 각자 실제 수신 경로까지 적는다.
otel:
  service:
    name: ${OTEL_SERVICE_NAME:mini-commerce-backend}
  exporter:
    otlp:
      traces:
        endpoint: ${OTLP_TRACES_ENDPOINT:http://tempo:4318/v1/traces}
      metrics:
        endpoint: ${OTLP_METRICS_ENDPOINT:http://prometheus:9090/api/v1/otlp/v1/metrics}
      logs:
        endpoint: ${OTLP_LOGS_ENDPOINT:http://loki:3100/otlp/v1/logs}
  traces:
    sampler: parentbased_always_on
  metrics:
    exporter: otlp
  logs:
    exporter: otlp

management:
  # health만 노출한다(GH #15 F2). probes.enabled로 /actuator/health/liveness·/readiness 그룹을
  # 활성화한다 — k8s 밖(compose)에서는 자동 활성화되지 않으므로 명시가 필요하다.
  # readiness에 DB/Redis/Kafka 인디케이터는 의도적으로 넣지 않는다(기본 readinessState만):
  # 외부 의존 순단 시 전 레플리카가 동시에 LB에서 빠지는 연쇄 장애를 막기 위함이며,
  # 부팅·생존이 외부 의존과 결합되지 않아야 한다는 GH #14 F1 원칙의 연장이다.
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

server:
  # 롤링 업데이트 중 처리 중이던 요청(주문 등)의 유실 방지(F4) — 새 요청 수신을 먼저 끊고
  # 진행 중 요청을 spring.lifecycle.timeout-per-shutdown-phase 안에서 완료시킨다. Kafka
  # notification 컨슈머도 같은 graceful 단계에서 리스너 컨테이너(SmartLifecycle)가 현재 poll분
  # 처리를 마치고 정지한 뒤 컨텍스트가 닫힌다. Boot 3.4+ 기본값이지만 계약이므로 명시(위 lifecycle 주석).
  shutdown: graceful

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
