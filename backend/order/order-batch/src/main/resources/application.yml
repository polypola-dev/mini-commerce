spring:
  application:
    name: mini-commerce-order-batch
  # Graceful shutdown 유예 계약(F4) — shop-api application.yml의 lifecycle 주석 참고.
  # 유예 30s < 컨테이너 종료 유예 35s(compose stop_grace_period, k8s terminationGracePeriodSeconds).
  lifecycle:
    timeout-per-shutdown-phase: 30s
  task:
    scheduling:
      shutdown:
        # 실행 중인 스케줄 작업(재고 만료 리퍼, 미발행 이벤트 스윕)이 있으면 종료 전에 완료를
        # 기다린다(F4). 기본값은 대기 없이 즉시 끊는다 — 스윕이 Kafka 발행 도중 끊기면 해당
        # 이벤트는 다음 스윕 주기까지 지연되고(유실은 아웃박스가 방지), 리퍼가 예약 해제 도중
        # 끊기면 만료 예약이 한 주기 더 잔류한다. 둘 다 치명적이진 않지만 롤링 업데이트마다
        # 반복될 동작이라 정상 완료를 기본으로 한다. ShedLock 락도 정상 해제된다.
        await-termination: true
        await-termination-period: 25s
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${DATABASE_USERNAME:minicommerce}
    password: ${DATABASE_PASSWORD:minicommerce}
    hikari:
      # 기동 순서 의존 제거(GH #14 F1). 기본값은 풀 생성 시 최초 커넥션을 못 얻으면 즉시
      # PoolInitializationException으로 부팅 자체를 실패시킨다 — k8s는 Pod 기동 순서를
      # 보장하지 않으므로(orderdb/order-api 스키마가 아직 준비 전일 수 있음), 풀 생성은
      # 항상 성공시키고 실제 커넥션 획득 시점(JPA validate 등)에만 connection-timeout 동안
      # 재시도하도록 한다.
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      # orderdb 스키마 소유권은 order-api 단독(ADR-005 S4). Flyway 도입(GH #11) 후에도 마이그레이션은
      # order-api만 소유하고, 이 앱은 Flyway 비활성 + validate로 기존 스키마 일치만 확인한다.
      ddl-auto: validate
    open-in-view: false
  flyway:
    # orderdb 마이그레이션은 order-api 단독 소유(GH #11) — 이 앱은 스키마를 만들지 않는다.
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # order-api와 동일한 이유(Modulith ByteArrayJsonMessageConverter가 byte[]를 넘김) —
      # 미발행 이벤트 재시도 스윕(IncompleteEventSweeper)도 같은 externalizer를 타므로 동일하게 맞춘다.
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
    # inventory.reservation.expired 구독(GH #3 S3 — InventoryEventKafkaConsumer). 발행측
    # (inventory-api Modulith)이 JSON byte[]로 보내므로 shop-api 컨슈머와 동일하게 맞춘다.
    consumer:
      group-id: order-batch
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
  modulith:
    republish-outstanding-events-on-restart: true
    events:
      jdbc:
        schema-initialization:
          # event_publication 테이블도 order-api가 만든다(스키마 소유권 단일화, 위 참고).
          enabled: false

app:
  batch:
    # inventory.reservation.expired 컨슈머(order-infra의 InventoryReservationExpiredKafkaListener)를
    # 이 프로세스에서만 활성화한다(GH #3 S3). order-api/order-admin도 order-infra를 물고 있어
    # 게이팅이 없으면 리스너가 3개 프로세스에서 뜬다(그쪽엔 consumer 역직렬화 설정도 없다).
    # (재고 만료 리퍼는 inventory-api로 이관됐고, 그쪽 app.batch.enabled는 별도 프로세스 설정이다.)
    enabled: true
  catalog:
    base-url: ${CATALOG_BASE_URL:http://localhost:8080}
  inventory:
    # order-infra의 InventoryRestAdapter가 전이의존으로 항상 조립되므로 호스트를 명시한다
    # (order-admin의 CATALOG_BASE_URL과 같은 이유 — 이 프로세스는 런타임에 호출하지 않는다).
    base-url: ${INVENTORY_BASE_URL:http://localhost:8084}
  security:
    # base-url과 같은 이유로 필요하다(B3, ADR-020) — order-infra의 RestClient 빈이 전이의존으로
    # 조립되면서 이 값을 요구한다. 이 프로세스는 /internal을 호출하지도 노출하지도 않는다.
    internal-api-key: ${INTERNAL_API_KEY}

# OTel 공식 스타터(GH #8, shop-api 스파이크 GH #7 후속으로 정식 반영). Trace/Metric/Log 3축을
# 각각 다른 백엔드(Tempo/Prometheus/Loki)로 보내야 해서 시그널별 endpoint를 명시한다 — per-signal
# endpoint는 (공용 endpoint와 달리) 경로를 자동으로 안 붙여주므로 각자 실제 수신 경로까지 적는다.
otel:
  service:
    name: ${OTEL_SERVICE_NAME:mini-commerce-order-batch}
  exporter:
    otlp:
      traces:
        endpoint: ${OTLP_TRACES_ENDPOINT:http://tempo:4318/v1/traces}
      metrics:
        endpoint: ${OTLP_METRICS_ENDPOINT:http://prometheus:9090/api/v1/otlp/v1/metrics}
      logs:
        endpoint: ${OTLP_LOGS_ENDPOINT:http://loki:3100/otlp/v1/logs}
  traces:
    sampler: parentbased_always_on
  metrics:
    exporter: otlp
  logs:
    exporter: otlp

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

server:
  port: ${SERVER_PORT:8083}
  # 웹 표면은 actuator probe뿐이지만 graceful 단계에서 스케줄러 종료 대기(위 task.scheduling.shutdown)와
  # Kafka producer flush가 함께 이뤄지므로 다른 모듈과 동일하게 명시한다(F4).
  shutdown: graceful
