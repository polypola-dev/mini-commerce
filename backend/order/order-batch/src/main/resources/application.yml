spring:
  application:
    name: mini-commerce-order-batch
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${DATABASE_USERNAME:minicommerce}
    password: ${DATABASE_PASSWORD:minicommerce}
  jpa:
    hibernate:
      # orderdb 스키마 소유권은 order-api 단독(ADR-005 S4, 아키텍처 리뷰 지적) — 동시 기동 시
      # 여러 앱이 동시에 DDL(update)을 실행하는 경합을 피한다. order-api가 먼저 healthy가 되길
      # 기다린 뒤 뜨므로(docker-compose depends_on) 스키마는 이미 준비돼 있다.
      ddl-auto: none
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  modulith:
    republish-outstanding-events-on-restart: true
    events:
      jdbc:
        schema-initialization:
          # event_publication 테이블도 order-api가 만든다(스키마 소유권 단일화, 위 참고).
          enabled: false

app:
  batch:
    # 재고 만료 리퍼(inventory.ExpiredReservationReleaser)와 그 리스너
    # (order-infra.ReservationExpiredEventListener)를 이 프로세스에서만 활성화한다(ADR-005 S4).
    # @EnableScheduling 유무만으로 격리하면 Modulith 이벤트 재발행 경로가 열려 있어 다른 부팅
    # 앱이 실수로 재처리할 수 있다(아키텍처 리뷰에서 지적) — 명시적 플래그로 이중 방어한다.
    enabled: true
  catalog:
    base-url: ${CATALOG_BASE_URL:http://localhost:8080}

management:
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://tempo:4318/v1/traces}
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

server:
  port: ${SERVER_PORT:8083}
