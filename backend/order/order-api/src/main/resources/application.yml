spring:
  application:
    name: mini-commerce-order-api
  # Graceful shutdown 유예 계약(F4) — shop-api application.yml의 lifecycle 주석 참고.
  # 유예 30s < 컨테이너 종료 유예 35s(compose stop_grace_period, k8s terminationGracePeriodSeconds).
  lifecycle:
    timeout-per-shutdown-phase: 30s
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${DATABASE_USERNAME:minicommerce}
    password: ${DATABASE_PASSWORD:minicommerce}
  jpa:
    hibernate:
      # Flyway 도입(GH #11). orderdb 스키마는 order-api가 단독 소유(Flyway 마이그레이션),
      # Hibernate는 validate만 수행. event_publication은 JPA 엔티티가 아니라 validate 대상 아님.
      ddl-auto: validate
    open-in-view: false
  flyway:
    # orderdb 스키마는 order-api가 단독 소유(GH #11). order-admin/order-batch는 validate-only.
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Kafka producer/consumer observation 자동계측 실험(Issue #7 Step 6) — Modulith
    # events-kafka 외부화 경로에도 trace 전파가 붙는지 확인용.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Modulith events-kafka(KafkaJacksonConfiguration)가 이벤트를 ByteArrayJsonMessageConverter로
      # JSON byte[]로 변환해 넘기므로, value-serializer는 그 byte[]를 그대로 통과시켜야 한다.
      # StringSerializer로 두면 byte[]를 String으로 캐스팅하려다 SerializationException이 난다.
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
  modulith:
    # 미발행 이벤트 재시도는 order-batch 단독 책임(ADR-005 S4) — order-api에서 켜두면 재시작 시
    # order-batch가 처리 중이던 미완료 이벤트를 이 프로세스가 가로채 재처리할 수 있다(아키텍처
    # 리뷰에서 지적, IncompleteEventSweeper와 책임 중복).
    republish-outstanding-events-on-restart: false
    events:
      jdbc:
        schema-initialization:
          # event_publication 테이블은 Flyway baseline이 소유(GH #11) — Modulith 자체 초기화 끔.
          enabled: false

app:
  catalog:
    # order-api가 별도 프로세스이므로 catalog(shop-api)의 실제 호스트를 가리켜야 한다.
    base-url: ${CATALOG_BASE_URL:http://localhost:8080}
  inventory:
    # 재고 예약 사가(reserve/release/status + 한시 confirm/restock)는 inventory-api를 REST로
    # 호출한다(GH #3 S3, InventoryRestAdapter).
    base-url: ${INVENTORY_BASE_URL:http://localhost:8084}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    jwks-url: ${SUPABASE_JWKS_URL:https://wzdifkwupleogfixibiv.supabase.co/auth/v1/.well-known/jwks.json}
    bff-secret-key: ${BFF_SECRET_KEY}
    # 서비스간 /internal 인증(B3, ADR-020). order-api는 발신 전용 — 자신은 /internal을
    # 노출하지 않으므로 수신 필터가 없다(catalog·inventory-api로 나가는 호출에만 첨부).
    internal-api-key: ${INTERNAL_API_KEY}

# 서비스간 동기 REST 호출 서킷브레이커(D6). order-infra가 여는 간선은 order→catalog와
# order→inventory-api 둘이다.
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        # 트래픽이 적은 시간대에 호출 1~2건 실패로 서킷이 열리지 않도록 최소 호출 수를 둔다.
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        # 응답은 오는데 느린 경우도 장애로 센다. slowCallRateThreshold=100은 "전부 느릴 때만"
        # 여는 보수적 설정이다.
        slowCallDurationThreshold: 3s
        slowCallRateThreshold: 100
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        # readiness/health에 서킷 상태를 넣지 않는다 — 아래 management 주석과 같은 이유(외부 의존
        # 순단 시 전 레플리카가 동시에 LB에서 빠지는 연쇄 장애 방지). 상태는 OTel 메트릭으로만 본다.
        registerHealthIndicator: false
    instances:
      catalog:
        baseConfig: default
        ignoreExceptions:
          # 없는 상품/옵션(catalog 404 → 어댑터가 변환)은 정상 비즈니스 응답이다. 실패로 세면
          # 잘못된 productId를 반복 조회하는 것만으로 멀쩡한 catalog가 끊긴다.
          - jakarta.persistence.EntityNotFoundException
      inventory:
        baseConfig: default
        ignoreExceptions:
          # 품절은 inventory-api가 정상 동작 중이라는 증거다. 이걸 실패로 세면 인기 상품 하나가
          # 품절된 것만으로 서킷이 열려 다른 모든 상품의 주문까지 끊긴다 — 가장 중요한 제외 항목.
          - com.minicommerce.order.domain.exception.OutOfStockException
          # 예약 충돌(409)·잘못된 요청(400)은 이쪽 요청 조립 문제이거나 정상 흐름이다.
          # 어느 쪽도 재고 서비스의 건강 상태를 뜻하지 않는다(InventoryRestAdapter 주석 참고).
          - java.lang.IllegalStateException

server:
  port: ${SERVER_PORT:8081}
  # 롤링 업데이트 중 처리 중이던 주문 요청 유실 방지(F4) — 새 요청을 먼저 끊고 진행 중 요청을
  # 유예 내 완료. 주문 확정 후 이벤트 발행은 아웃박스(event_publication)에 커밋되므로 프로세스가
  # 내려가도 order-batch 스윕이 재발행한다 — graceful은 "HTTP 응답까지"의 보호 장치.
  # Boot 3.4+ 기본값이지만 계약이므로 명시(위 lifecycle 주석).
  shutdown: graceful

# OTel 공식 스타터(GH #8, shop-api 스파이크 GH #7 후속으로 정식 반영). Trace/Metric/Log 3축을
# 각각 다른 백엔드(Tempo/Prometheus/Loki)로 보내야 해서 시그널별 endpoint를 명시한다 — per-signal
# endpoint는 (공용 endpoint와 달리) 경로를 자동으로 안 붙여주므로 각자 실제 수신 경로까지 적는다.
otel:
  service:
    name: ${OTEL_SERVICE_NAME:mini-commerce-order-api}
  exporter:
    otlp:
      traces:
        endpoint: ${OTLP_TRACES_ENDPOINT:http://tempo:4318/v1/traces}
      metrics:
        endpoint: ${OTLP_METRICS_ENDPOINT:http://prometheus:9090/api/v1/otlp/v1/metrics}
      logs:
        endpoint: ${OTLP_LOGS_ENDPOINT:http://loki:3100/otlp/v1/logs}
  traces:
    sampler: parentbased_always_on
  metrics:
    exporter: otlp
  logs:
    exporter: otlp

management:
  # health만 노출한다(GH #15 F2) — 이전의 /internal/inventory/stocks 편법 healthcheck를
  # actuator probe로 대체했다. probes.enabled로 /actuator/health/liveness·/readiness 그룹을
  # 활성화한다(k8s 밖에서는 자동 활성화되지 않으므로 명시 필요).
  # readiness에 DB/Redis/Kafka 인디케이터는 의도적으로 넣지 않는다(기본 readinessState만) —
  # 외부 의존 순단 시 연쇄 장애 방지, GH #14 F1 원칙의 연장.
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
