spring:
  application:
    name: mini-commerce-order-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${DATABASE_USERNAME:minicommerce}
    password: ${DATABASE_PASSWORD:minicommerce}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Kafka producer/consumer observation 자동계측 실험(Issue #7 Step 6) — Modulith
    # events-kafka 외부화 경로에도 trace 전파가 붙는지 확인용.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  modulith:
    # 미발행 이벤트 재시도는 order-batch 단독 책임(ADR-005 S4) — order-api에서 켜두면 재시작 시
    # order-batch가 처리 중이던 미완료 이벤트를 이 프로세스가 가로채 재처리할 수 있다(아키텍처
    # 리뷰에서 지적, IncompleteEventSweeper와 책임 중복).
    republish-outstanding-events-on-restart: false
    events:
      jdbc:
        schema-initialization:
          enabled: true

app:
  catalog:
    # order-api가 별도 프로세스이므로 catalog(shop-api)의 실제 호스트를 가리켜야 한다.
    base-url: ${CATALOG_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    jwks-url: ${SUPABASE_JWKS_URL:https://wzdifkwupleogfixibiv.supabase.co/auth/v1/.well-known/jwks.json}
    bff-secret-key: ${BFF_SECRET_KEY}

server:
  port: ${SERVER_PORT:8081}

management:
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://tempo:4318/v1/traces}
  tracing:
    sampling:
      probability: 1.0
  # 이 서비스의 docker-compose healthcheck는 actuator를 쓰지 않으므로(order-api는
  # /internal/inventory/stocks를 호출) 어떤 actuator 엔드포인트도 웹에 노출하지 않는다.
  # tracing은 엔드포인트 노출과 무관하게 동작한다.
  endpoints:
    web:
      exposure:
        include: ""

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
