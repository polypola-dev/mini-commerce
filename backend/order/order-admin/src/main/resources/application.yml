spring:
  application:
    name: mini-commerce-order-admin
  # Graceful shutdown 유예 계약(F4) — shop-api application.yml의 lifecycle 주석 참고.
  # 유예 30s < 컨테이너 종료 유예 35s(compose stop_grace_period, k8s terminationGracePeriodSeconds).
  lifecycle:
    timeout-per-shutdown-phase: 30s
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${DATABASE_USERNAME:minicommerce}
    password: ${DATABASE_PASSWORD:minicommerce}
    hikari:
      # 기동 순서 의존 제거(GH #14 F1). 기본값은 풀 생성 시 최초 커넥션을 못 얻으면 즉시
      # PoolInitializationException으로 부팅 자체를 실패시킨다 — k8s는 Pod 기동 순서를
      # 보장하지 않으므로(orderdb/order-api 스키마가 아직 준비 전일 수 있음), 풀 생성은
      # 항상 성공시키고 실제 커넥션 획득 시점(JPA validate 등)에만 connection-timeout 동안
      # 재시도하도록 한다.
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      # orderdb 스키마 소유권은 order-api 단독(ADR-005 S4). Flyway 도입(GH #11) 후에도 마이그레이션은
      # order-api만 소유하고, 이 앱은 Flyway 비활성 + validate로 기존 스키마 일치만 확인한다.
      ddl-auto: validate
    open-in-view: false
  flyway:
    # orderdb 마이그레이션은 order-api 단독 소유(GH #11) — 이 앱은 스키마를 만들지 않는다.
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

app:
  inventory:
    # 관리자 주문취소가 재입고(restock)를 inventory-api REST로 호출한다(GH #3 S3).
    base-url: ${INVENTORY_BASE_URL:http://localhost:8084}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    jwks-url: ${SUPABASE_JWKS_URL:https://wzdifkwupleogfixibiv.supabase.co/auth/v1/.well-known/jwks.json}
    bff-secret-key: ${BFF_SECRET_KEY}
    # 서비스간 /internal 인증(B3, ADR-020) — 관리자 주문취소의 restock 호출에 첨부된다.
    internal-api-key: ${INTERNAL_API_KEY}

# OTel 공식 스타터(GH #8, shop-api 스파이크 GH #7 후속으로 정식 반영). Trace/Metric/Log 3축을
# 각각 다른 백엔드(Tempo/Prometheus/Loki)로 보내야 해서 시그널별 endpoint를 명시한다 — per-signal
# endpoint는 (공용 endpoint와 달리) 경로를 자동으로 안 붙여주므로 각자 실제 수신 경로까지 적는다.
otel:
  service:
    name: ${OTEL_SERVICE_NAME:mini-commerce-order-admin}
  exporter:
    otlp:
      traces:
        endpoint: ${OTLP_TRACES_ENDPOINT:http://tempo:4318/v1/traces}
      metrics:
        endpoint: ${OTLP_METRICS_ENDPOINT:http://prometheus:9090/api/v1/otlp/v1/metrics}
      logs:
        endpoint: ${OTLP_LOGS_ENDPOINT:http://loki:3100/otlp/v1/logs}
  traces:
    sampler: parentbased_always_on
  metrics:
    exporter: otlp
  logs:
    exporter: otlp

management:
  endpoints:
    web:
      exposure:
        include: health
  # /actuator/health/liveness·/readiness 그룹 활성화(GH #15 F2). readiness에 외부 의존
  # 인디케이터를 넣지 않는 이유는 shop-api application.yml의 management 주석 참고.
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

server:
  port: ${SERVER_PORT:8082}
  # 롤링 업데이트 중 처리 중이던 관리자 요청(주문 상태 변경 등) 유실 방지(F4).
  # Boot 3.4+ 기본값이지만 계약이므로 명시(위 lifecycle 주석).
  shutdown: graceful
