services:
  - type: web
    name: mini-commerce-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/products
    # 운영 배포 동결(ADR-007) — OKE 이전 완료 전까지 이 서비스는 폐기 대상 구버전으로
    # 고정 유지한다. autoDeploy 기본값(true)이 push마다 재배포를 실제로 시도해
    # Flyway baseline-version 설정 오류(V1이 기존 스키마와 충돌)로 크래시가 났었다.
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: BFF_SECRET_KEY
        sync: false
