# kind 로컬 클러스터 정의 (G1, ADR-008)
# 생성:   kind create cluster --config k8s/kind/cluster.yaml
# 삭제:   kind delete cluster --name mini-commerce
#
# - 멀티노드(control-plane 1 + worker 2): 스케줄링/롤링업데이트/PodDisruption 등
#   운영(OKE 멀티노드)과 동일한 조건을 로컬에서 재현하기 위함
# - control-plane에 ingress-ready 라벨 + 80/443 hostPort 매핑:
#   G6 ingress-nginx를 kind 표준 레시피로 붙이기 위한 선행 준비
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: mini-commerce
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
