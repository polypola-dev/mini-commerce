# NetworkPolicy — default-deny(Ingress) + 명시 허용 (G9, ADR-014)
# /internal/** 차단의 인프라 레이어: Ingress(L7)는 /internal 라우팅 자체가 없고(ADR-012),
# 여기서 파드 도달 가능 주체를 네트워크(L3/L4)로 강제한다. 요청 신원 검증은 B3(앱 레이어).
# 허용 근거는 각 서비스의 env var 계약(backend/doc/CONFIGURATION.md)과 1:1 —
# 계약에 없는 호출 경로는 열지 않는다.
# Kafka 파드는 Strimzi operator가 자동 생성하는 NetworkPolicy가 담당(추가 허용으로 공존).
# kubelet probe는 NetworkPolicy 적용 대상이 아니라 default-deny에도 살아남는다.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  # 네임스페이스 전체(향후 추가 파드 포함) — 아래 allow 정책에 없으면 인바운드 전부 차단
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-shop-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: shop-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        # 외부 진입은 ingress-nginx 컨트롤러 경유만 (G6 단일 진입점)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
              app.kubernetes.io/component: controller
        # CATALOG_BASE_URL 소비자 — order-api(주문 검증 호출), order-admin/order-batch
        # (현재 미호출이지만 order-infra 전이의존으로 클라이언트가 조립되는 계약 유지)
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-api
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-admin
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-batch
      ports:
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-order-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: order-api
  policyTypes:
    - Ingress
  ingress:
    # 외부(고객) 진입 전용 — 서비스간 인바운드 계약 없음. 과거 shop-api→order-api(재고 조회)는
    # inventory 완전분리(GH #3)로 shop-api→inventory-api로 이동해 제거됐다.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
              app.kubernetes.io/component: controller
      ports:
        - port: 8081
          protocol: TCP
---
# inventory-api 인바운드 — 재고 조회/예약 사가 소비자 (GH #3). ingress-nginx는 미포함
# (/internal 전용, 외부 비노출). Kafka(order.paid/canceled 구독)는 Strimzi 자동 netpol 소관.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-inventory-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: inventory-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        # INVENTORY_BASE_URL 소비자 — shop-api(재고 조회), order-api(예약/해제/상태).
        # order-admin/order-batch는 현재 미호출이지만 order-infra 전이의존으로 클라이언트가
        # 조립되고 env 계약을 갖는다(shop-api netpol의 order-batch 허용과 동일 논리).
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: shop-api
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-api
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-admin
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: order-batch
      ports:
        - port: 8084
          protocol: TCP
---
# order-admin은 외부(관리자) 진입 전용 — 서비스간 인바운드 계약 없음
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-to-order-admin
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: order-admin
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
              app.kubernetes.io/component: controller
      ports:
        - port: 8082
          protocol: TCP
# order-batch는 인바운드 계약이 없다(Service도 없음) — default-deny만 적용된다.
