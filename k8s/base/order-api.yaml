# order-api — order+inventory 주문 웹계층(고객) 분리 서비스, orderdb 마이그레이션 단독 소유 (G3)
# probe·리소스·graceful 근거는 shop-api.yaml 주석 참고 (backend/doc/CONFIGURATION.md)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  labels:
    app.kubernetes.io/name: order-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: order-api
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-api
    spec:
      terminationGracePeriodSeconds: 40
      containers:
        - name: order-api
          image: mini-commerce/order-api
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ORDER_DATABASE_URL
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_USERNAME
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_PORT
            - name: REDIS_SSL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_SSL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REDIS_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: CATALOG_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CATALOG_BASE_URL
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CORS_ALLOWED_ORIGINS
            - name: SUPABASE_JWKS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SUPABASE_JWKS_URL
            - name: BFF_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: BFF_SECRET_KEY
            # 토스페이먼츠 결제 승인/취소(환불) API Basic 인증 (C1/GH #4)
            - name: TOSS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: TOSS_SECRET_KEY
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 2
            failureThreshold: 30
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: order-api
  labels:
    app.kubernetes.io/name: order-api
spec:
  selector:
    app.kubernetes.io/name: order-api
  ports:
    - name: http
      port: 8081 # INVENTORY_BASE_URL(http://order-api:8081) 계약 불변
      targetPort: http
