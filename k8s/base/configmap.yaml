# 비밀 아닌 환경변수 계약 (backend/doc/CONFIGURATION.md의 CM 분류 항목)
# 값의 원본은 docker-compose.yml environment 블록 — 호스트명만 k8s Service 이름으로 치환.
# 비밀(SEC 분류: DATABASE_USERNAME/PASSWORD, REDIS_PASSWORD, BFF_SECRET_KEY,
# SUPABASE_SERVICE_ROLE_KEY)은 Secret `app-secrets`로 — 평문 미커밋,
# k8s/scripts/secrets.sh로 관리(G8, ADR-013 — SOPS/age 암호화 커밋본은 k8s/secrets/).
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  # DB는 인스턴스 하나에 DB 2개 — shop-api는 minicommerce, order 계열은 orderdb (MSA S3-3b)
  SHOP_DATABASE_URL: jdbc:postgresql://postgres:5432/minicommerce
  ORDER_DATABASE_URL: jdbc:postgresql://postgres:5432/orderdb
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_SSL: "false"
  # Strimzi가 생성하는 bootstrap 서비스 (G5, ADR-011). shop-api는 부팅 시 이 DNS가
  # 해석돼야 기동하므로(G3 발견) Kafka CR이 앱보다 먼저 적용돼 있어야 한다.
  KAFKA_BOOTSTRAP_SERVERS: mini-commerce-kafka-bootstrap:9092
  # 서비스간 호출 — Service 포트를 compose 시절 포트와 동일하게 유지해 URL 계약 불변
  CATALOG_BASE_URL: http://shop-api:8080
  INVENTORY_BASE_URL: http://order-api:8081
  CORS_ALLOWED_ORIGINS: http://localhost:3000
  SUPABASE_JWKS_URL: https://wzdifkwupleogfixibiv.supabase.co/auth/v1/.well-known/jwks.json
  SUPABASE_URL: https://wzdifkwupleogfixibiv.supabase.co
