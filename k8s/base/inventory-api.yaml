# inventory-api — inventory 완전분리 서비스, inventorydb 마이그레이션 단독 소유 (GH #3)
# 예약 사가 REST(/internal)·만료 리퍼·order.paid/canceled 구독·inventory.reservation.expired 발행.
# 외부(ingress) 미노출 — 전부 /internal. JWT/CORS 불필요(shared-web 미의존).
# probe·리소스·graceful 근거는 shop-api.yaml 주석 참고 (backend/doc/CONFIGURATION.md).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  labels:
    app.kubernetes.io/name: inventory-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-api
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory-api
    spec:
      terminationGracePeriodSeconds: 40
      containers:
        - name: inventory-api
          image: mini-commerce/inventory-api
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8084
          env:
            - name: SERVER_PORT
              value: "8084"
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: INVENTORY_DATABASE_URL
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_USERNAME
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_PORT
            - name: REDIS_SSL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_SSL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REDIS_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            # 이 서비스의 웹 API는 전부 /internal이라 이 키가 유일한 앱 레이어 방어다(B3, ADR-020)
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: INTERNAL_API_KEY
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 2
            failureThreshold: 30
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  labels:
    app.kubernetes.io/name: inventory-api
spec:
  selector:
    app.kubernetes.io/name: inventory-api
  ports:
    - name: http
      port: 8084 # INVENTORY_BASE_URL(http://inventory-api:8084) 계약 불변
      targetPort: http
