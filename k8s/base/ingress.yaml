# API 단일 진입점 — 경로 기반 라우팅 (G6, ADR-012)
# 컨트롤러는 ingress-nginx(Helm, k8s/ingress-nginx/) — 규칙만 여기서 소유한다.
# nginx는 최장 프리픽스 우선이라 /api/admin/products(catalog admin, shop-api 소속)는
# /api 규칙으로 떨어진다 — admin 프리픽스가 전부 order-admin이 아님에 주의.
# /internal/** 은 의도적으로 노출하지 않는다(서비스간 전용 — 네트워크 차단은 G9
# NetworkPolicy가 강제한다: base/network-policy.yaml, ADR-014).
# host 미지정(로컬 = localhost 직결). 운영 도메인·TLS는 prod 오버레이에서 patch 예정.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  labels:
    app.kubernetes.io/name: api-ingress
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/admin/orders
            pathType: Prefix
            backend:
              service:
                name: order-admin
                port:
                  number: 8082
          - path: /api/orders
            pathType: Prefix
            backend:
              service:
                name: order-api
                port:
                  number: 8081
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: shop-api
                port:
                  number: 8080
