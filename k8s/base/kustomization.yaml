# 환경 무관 공통 매니페스트 (ADR-009)
# Secret `app-secrets`는 여기 없다 — 실물 미커밋(G8 소관), 로컬 생성 명령은 k8s/README.md
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mini-commerce

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: mini-commerce

resources:
  - namespace.yaml
  - configmap.yaml
  - shop-api.yaml
  - order-api.yaml
  - order-admin.yaml
  - order-batch.yaml
