# ingress-nginx 컨트롤러 (wave 0) — ADR-012 승계, ADR-022
# 운영(OKE)은 values-prod.yaml이 필요하다 — service.type=LoadBalancer로 OCI 무료
# Flexible LB(10Mbps) 1개를 프로비저닝한다. kind용 values-local.yaml(hostPort)과 분리.
#   ⚠️ TODO(OKE 확보 후): k8s/ingress-nginx/values-prod.yaml 작성
#      - controller.service.type: LoadBalancer
#      - controller.service.annotations: OCI LB shape/flex 대역 지정
#      - 라우팅 규칙 자체는 base/ingress.yaml 소유(변경 없음), host/TLS만 prod patch
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mini-commerce
  sources:
    - repoURL: https://kubernetes.github.io/ingress-nginx
      chart: ingress-nginx
      targetRevision: 4.15.1
      helm:
        valueFiles:
          - $values/k8s/ingress-nginx/values-prod.yaml   # TODO: 작성 필요
    - repoURL: https://github.com/polypola-dev/mini-commerce.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
