# wave 2 — 앱 스택(overlays/local-gitops) — Kafka(wave 1) Healthy 후 sync (ADR-022)
# overlays/local + ksops Secret 생성. 기존 수동배포 앱 5종+postgres/redis+Secret을
# ArgoCD가 adopt한다. wave 2라 wave 1의 Kafka health가 Healthy가 될 때까지 대기.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rehearsal-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mini-commerce
  source:
    repoURL: https://github.com/polypola-dev/mini-commerce.git
    targetRevision: main
    path: k8s/overlays/local-gitops
  destination:
    server: https://kubernetes.default.svc
    namespace: mini-commerce
  # StatefulSet의 volumeClaimTemplates는 apiserver가 volumeMode/status/apiVersion을
  # 채우는데 immutable이라 ArgoCD가 diff를 못 지워 영구 OutOfSync가 된다. 이게 앱
  # 전체 selfHeal을 스로틀(같은 리비전 재시도 5분 백오프)시키므로 무시 처리한다.
  #   ⚠️ kind 전용: prod(OKE)엔 ArgoCD가 직접 관리하는 StatefulSet이 없다
  #   (postgres/redis=Supabase/Upstash 외부, Kafka=Strimzi operator 소유) — 이 문제 미발생.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
