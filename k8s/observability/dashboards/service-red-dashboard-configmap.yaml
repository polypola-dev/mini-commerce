apiVersion: v1
kind: ConfigMap
metadata:
  name: mc-service-red-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  mc-service-red.json: |
    {
      "title": "mini-commerce / Service RED + JVM",
      "uid": "mc-service-red",
      "tags": [
        "mini-commerce"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "job",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": "label_values(http_server_request_duration_seconds_count, job)",
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Request rate (req/s)",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (job) (rate(http_server_request_duration_seconds_count{job=~\"$job\"}[5m]))",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error rate (5xx / total)",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum by (job) (rate(http_server_request_duration_seconds_count{job=~\"$job\", http_response_status_code=~\"5..\"}[5m])) / sum by (job) (rate(http_server_request_duration_seconds_count{job=~\"$job\"}[5m]))",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Duration p50 / p95 / p99 (s)",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (job, le) (rate(http_server_request_duration_seconds_bucket{job=~\"$job\"}[5m])))",
              "legendFormat": "p50 {{job}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (job, le) (rate(http_server_request_duration_seconds_bucket{job=~\"$job\"}[5m])))",
              "legendFormat": "p95 {{job}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (job, le) (rate(http_server_request_duration_seconds_bucket{job=~\"$job\"}[5m])))",
              "legendFormat": "p99 {{job}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "In-flight-ish: request count by status class",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (job, http_response_status_code) (rate(http_server_request_duration_seconds_count{job=~\"$job\"}[5m]))",
              "legendFormat": "{{job}} {{http_response_status_code}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "JVM heap used (bytes)",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum by (job) (jvm_memory_used_bytes{job=~\"$job\", jvm_memory_type=\"heap\"})",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 6,
          "title": "JVM GC pause rate (s/s)",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (job) (rate(jvm_gc_duration_seconds_sum{job=~\"$job\"}[5m]))",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 7,
          "title": "Container restarts in-place (같은 Pod 안에서 컨테이너만 재기동 — 예: OOMKilled 후 자동복구)",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 24
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"mini-commerce\"}[1h]))",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 8,
          "title": "Pod age (초 — 급격히 0 근처로 떨어지면 Pod가 삭제·재생성된 것. k9s Kill/OOM 등 전체 재생성은 위 패널이 아니라 이 패널로 확인)",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 24
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "time() - kube_pod_start_time{namespace=\"mini-commerce\"}",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ]
    }
