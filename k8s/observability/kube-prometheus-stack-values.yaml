# H2(ROADMAP) — 노드/파드 메트릭 수집 + Prometheus(OTLP 네이티브 수신, H1 Collector가 소스) +
# 번들 Grafana(조회 UI 겸 Tempo/Loki datasource 등록처 — 별도 Grafana 배포 안 함).
# kind 로컬 전용, 운영(OKE)은 SaaS 관측성 재검토 대상(docker/observability/README.md 원칙 계승).

# kind 컨트롤 플레인 컴포넌트(scheduler/controller-manager/etcd/kube-proxy)는 127.0.0.1
# bind라 외부에서 스크레이프 불가 — 기본 ServiceMonitor를 켜두면 대상이 영구 down으로
# 잡혀 노이즈만 발생한다(kind 클러스터의 잘 알려진 제약).
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

# kube-prometheus-stack이 함께 딸려오는 기본 알림 규칙(수백 개, 클러스터 전반)은 배제 —
# H5는 우리 서비스에 맞춘 규칙만 별도 PrometheusRule(k8s/observability/alert-rules.yaml)로 관리.
defaultRules:
  create: false

# H5(ADR-018) — Alertmanager 활성화. receiver는 아직 미설정(null) — Slack/Telegram
# webhook이 준비되면 그때 추가(사용자 결정, 2026-07-15). 지금은 규칙 평가 + Alertmanager/
# Grafana UI에서 firing 상태 확인까지가 스코프.
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi

prometheus:
  prometheusSpec:
    # Prometheus v3.x(이 차트 v3.13.1) 네이티브 옵션 — compose의 experimental 플래그
    # (v2.55.1 --enable-feature=otlp-write-receiver)가 stable 옵션으로 승격된 결과
    # (docker/observability/README.md 트러블슈팅 항목의 "v3.x 승격 여부 확인" 결론).
    enableOTLPReceiver: true
    retention: 24h
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 400Mi

grafana:
  # 로컬 전용 조회 도구 — compose와 동일하게 익명 Admin 접근(로그인 불필요, GF_AUTH_ANONYMOUS_*
  # env 대신 grafana.ini 동등 설정). 대시보드/데이터는 영속하지 않는다(compose 승계 결정 —
  # docker/observability/README.md 트러블슈팅: "Grafana는 순수 조회 도구").
  grafana.ini:
    auth.anonymous:
      enabled: true
      org_name: Main Org.
      org_role: Admin
    server:
      # Ingress 서브패스(/grafana) 경유 접속 — kind 재생성해도 helm 재설치만으로
      # 영구 재현되도록 port-forward 대신 Ingress로 고정(2026-07-15 사용자 요청).
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana"
      serve_from_sub_path: true
  ingress:
    enabled: true
    ingressClassName: nginx
    path: /grafana
    pathType: Prefix
  additionalDataSources:
    # uid를 명시 고정 — 지정 안 하면 Grafana가 임의 문자열을 생성해 재설치 때마다
    # 바뀔 수 있고, 대시보드 JSON에서 datasource를 uid로 참조하는 패널(로그/트레이스
    # 패널 등)이 깨진다. Prometheus는 차트 기본값 자체가 이미 uid: prometheus로 고정.
    - name: Tempo
      uid: tempo
      type: tempo
      access: proxy
      url: http://tempo.monitoring.svc.cluster.local:3200
      isDefault: false
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://loki-gateway.monitoring.svc.cluster.local
      isDefault: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
