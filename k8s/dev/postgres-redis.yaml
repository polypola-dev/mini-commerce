# [G3 검증용 임시 인프라 — G4에서 대체 예정]
# 로컬 클러스터에서 4개 서비스의 기동 검증에 필요한 최소 Postgres/Redis.
# G4(로컬 배치 결정: Bitnami 차트 vs StatefulSet+PVC)를 선점하지 않기 위해 오버레이에
# 포함하지 않고 별도 적용한다: kubectl apply -f k8s/dev/postgres-redis.yaml
# 데이터는 emptyDir(휘발) — 파드 재생성 시 초기화된다. 영속화는 G4 소관.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: mini-commerce
data:
  # docker/postgres-init/01-create-orderdb.sql과 동일 계약 — orderdb "데이터베이스"
  # 생성만 담당, 스키마는 Flyway(order-api 단독) 소유. G10에서 Job/initContainer로 정식 이관.
  01-create-orderdb.sql: |
    SELECT 'CREATE DATABASE orderdb'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'orderdb')\gexec
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: mini-commerce
  labels:
    app.kubernetes.io/name: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate # 단일 인스턴스 + emptyDir — 롤링 무의미
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: minicommerce
            - name: POSTGRES_USER
              value: minicommerce
            - name: POSTGRES_PASSWORD
              value: minicommerce # 임시 인프라 한정 — 앱 쪽은 Secret app-secrets 사용
          ports:
            - name: pg
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "minicommerce", "-d", "minicommerce"]
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mini-commerce
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: pg
      port: 5432
      targetPort: pg
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: mini-commerce
  labels:
    app.kubernetes.io/name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: mini-commerce
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
