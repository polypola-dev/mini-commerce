# CI(GitHub Actions kind) 오버레이 — local 위에 러너 환경 보정만 얹는다 (G11, ADR-016)
# 검증 대상은 local 오버레이 그 자체이므로 리소스는 전부 ../local 상속.
# 델타 1: 부팅 예산 — 2코어 러너에서 JVM 5개(앱 4 + Kafka)가 동시 부팅하면
# 로컬 기준 60s(30×2s)를 초과할 수 있다 — startupProbe가 그 흡수 장치이므로
# failureThreshold만 90(=180s)으로 완화한다. probe 계약 자체(경로·주기)는 불변.
# 델타 2: cpu request — 2코어(2000m) 러너에서 앱 4종+Kafka+addon의 request 합이
# allocatable을 넘겨 스케줄링 자체가 실패했다(실측: shop-api FailedScheduling
# Insufficient cpu). cpu limit은 애초에 없어(F6 — JIT 워밍업 스로틀 방지) request는
# 순수 스케줄러 예약치일 뿐이라 낮춰도 런타임 성능엔 영향 없음 — CI 전용으로만 완화.
# memory는 request=limit(JVM 힙 산정 기준, F6)이라 손대지 않는다.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../local

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/startupProbe/failureThreshold
        value: 90
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
