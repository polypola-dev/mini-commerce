# KSOPS generator — app-secrets.enc.yaml을 복호화해 Secret 생성 (ADR-022)
# enc 파일은 오버레이 밖 k8s/secrets/에 있으므로(ADR-013 규약) argocd-cm의
# kustomize.buildOptions에 --load-restrictor LoadRestrictionsNone가 필요하다.
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: app-secrets-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - ../../secrets/app-secrets.enc.yaml
