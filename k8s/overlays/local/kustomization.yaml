# local(kind) 오버레이 — ADR-008 클러스터 대상 (ADR-009)
# 선행: k8s/dev/kafka.yaml(G5에서 대체) + Secret app-secrets 생성 (k8s/README.md)
# 적용: kubectl apply -k k8s/overlays/local
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 오버레이 자체 리소스(postgres/redis)에도 base와 동일한 네임스페이스·공통 라벨 적용
namespace: mini-commerce

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: mini-commerce

resources:
  - ../../base
  # 로컬 전용 상태 저장 인프라 (G4, ADR-010) — 운영은 Supabase/Upstash라 local만 소유
  - postgres.yaml
  - redis.yaml
  # 로컬 인프라 인바운드 허용 — base default-deny의 local 보완 (G9, ADR-014)
  - network-policy.yaml
  # orderdb 생성 Job — postgres-init initdb 계약의 정식 이관 (G10, ADR-015)
  - db-init-job.yaml

# base의 image 이름을 kind load로 주입한 로컬 빌드 이미지로 치환.
# 이미지 빌드는 compose가 담당: docker compose build && kind load docker-image <이미지> --name mini-commerce
images:
  - name: mini-commerce/shop-api
    newName: mini-commerce-shop-api
    newTag: latest
  - name: mini-commerce/order-api
    newName: mini-commerce-order-api
    newTag: latest
  - name: mini-commerce/order-admin
    newName: mini-commerce-order-admin
    newTag: latest
  - name: mini-commerce/order-batch
    newName: mini-commerce-order-batch
    newTag: latest

patches:
  # shop-api만 시드 데이터 로드 (local 프로파일 = 시드 on/off 스위치, F5 프로파일 전략)
  - target:
      kind: Deployment
      name: shop-api
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: SPRING_PROFILES_ACTIVE
          value: local
  # H1 완료(ADR-018) — OTel Collector(monitoring ns, Helm)로 3축 전부 export.
  # per-signal endpoint는 SDK가 경로를 자동으로 안 붙여주므로(application.yml 주석,
  # F5 계약과 동일 패턴) 각자 실제 OTLP http 경로까지 명시한다.
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OTLP_TRACES_ENDPOINT
          value: http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318/v1/traces
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OTLP_METRICS_ENDPOINT
          value: http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318/v1/metrics
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OTLP_LOGS_ENDPOINT
          value: http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318/v1/logs
