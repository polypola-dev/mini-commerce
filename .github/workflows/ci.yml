name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (gradlew build)
    runs-on: ubuntu-latest
    services:
      # InventoryConcurrencyTest가 localhost:6379 실 Redis를 요구한다 (Lua 스크립트 원자성 검증)
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build & test (전 모듈)
        working-directory: backend
        run: ./gradlew build --console=plain

  frontend:
    name: Frontend (tsc + jest + next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx jest --ci

      - name: Build
        # 빌드 타임에 참조되는 환경변수 계약(.env.example)의 CI용 더미 값.
        # 실제 값은 Vercel 배포 환경에서만 주입된다.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
          API_BASE_URL: http://localhost:18080
          ORDER_SERVICE_URL: http://localhost:18081
          ORDER_ADMIN_SERVICE_URL: http://localhost:18082
          BFF_SECRET_KEY: ci-dummy-bff-secret-key-0123456789abcdef
        run: npx next build
