# CD 1단계 — kind 배포 검증 (G11, ADR-016)
# k8s 매니페스트·Dockerfile·compose 빌드 계약이 바뀔 때 실제 클러스터 배포를 검증한다.
# 백엔드 코드 자체는 ci.yml(gradlew build)이 게이트 — 여기서 다시 돌리지 않는다.
# 트리거를 좁힌 이유: private 리포 러너(2코어/7GB)에서 이미지 4종 풀빌드(E5 미해결,
# COPY . . 캐시 전멸)가 느려 매 푸시 실행은 무료 분수 낭비. E5 후 재평가.
# 2단계(Argo CD GitOps)는 OKE 구축 + E4(GHCR 이미지) 선행 — ADR-016 참고.
name: Deploy (kind)

on:
  push:
    branches: [main]
    paths:
      - k8s/**
      - backend/Dockerfile
      - docker-compose.yml
      - .github/workflows/deploy-kind.yml
  workflow_dispatch:

concurrency:
  group: deploy-kind-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kind-deploy:
    name: kind 배포 검증
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: kind 클러스터 생성 (CI 단일 노드)
        uses: helm/kind-action@v1
        with:
          cluster_name: mini-commerce
          config: k8s/kind/cluster-ci.yaml

      # 긴 이미지 빌드 동안 Kafka·ingress가 백그라운드에서 뜨도록 먼저 설치한다
      - name: Strimzi operator + Kafka CR + ingress-nginx 설치
        run: |
          kubectl create namespace mini-commerce
          helm repo add strimzi https://strimzi.io/charts/
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm install strimzi-operator strimzi/strimzi-kafka-operator \
            --version 1.1.0 -n strimzi --create-namespace \
            -f k8s/kafka/operator-values.yaml --wait
          kubectl apply -f k8s/kafka/kafka-cluster.yaml
          helm install ingress-nginx ingress-nginx/ingress-nginx \
            --version 4.15.1 -n ingress-nginx --create-namespace \
            -f k8s/ingress-nginx/values-local.yaml

      - name: Secret app-secrets (CI 더미 — 키 계약은 k8s/scripts/secrets.sh와 동일)
        # 배포 검증에 실비밀이 불필요하다 — JWKS/서비스롤 키는 요청 경로에서만 쓰여
        # 더미로도 앱이 부팅한다. age 키를 CI에 넣지 않는 것이 의도(ADR-016).
        run: |
          kubectl create secret generic app-secrets -n mini-commerce \
            --from-literal=DATABASE_USERNAME=minicommerce \
            --from-literal=DATABASE_PASSWORD=minicommerce \
            --from-literal=REDIS_PASSWORD="" \
            --from-literal=BFF_SECRET_KEY=ci-dummy-bff-secret-key-0123456789abcdef \
            --from-literal=SUPABASE_SERVICE_ROLE_KEY=ci-dummy-service-role-key

      - name: 이미지 빌드 (compose가 빌드 담당 — k8s/README.md 계약)
        env:
          # compose 파일 보간용 더미 — build에는 쓰이지 않는 값
          BFF_SECRET_KEY: ci-dummy
          SUPABASE_SERVICE_ROLE_KEY: ci-dummy
        run: docker compose build shop-api order-api order-admin order-batch

      - name: 이미지 kind 주입
        run: |
          for img in mini-commerce-shop-api mini-commerce-order-api mini-commerce-order-admin mini-commerce-order-batch; do
            kind load docker-image "$img:latest" --name mini-commerce
          done

      - name: Kafka Ready 대기 (앱보다 먼저 — G3/G5 계약)
        run: kubectl wait kafka/mini-commerce -n mini-commerce --for=condition=Ready --timeout=600s

      - name: 배포 (overlays/ci = local + 부팅 예산 완화)
        run: kubectl apply -k k8s/overlays/ci

      - name: 롤아웃·초기화 Job 대기
        run: |
          for d in shop-api order-api order-admin order-batch; do
            kubectl rollout status deploy/$d -n mini-commerce --timeout=420s
          done
          kubectl wait --for=condition=complete job/orderdb-init -n mini-commerce --timeout=180s

      - name: 스모크 테스트 (ingress 단일 진입점 경유)
        run: |
          kubectl wait deploy/ingress-nginx-controller -n ingress-nginx --for=condition=available --timeout=180s
          # /api → shop-api 200 + 시드 데이터(Flyway db/seed local 프로파일) 존재
          body=$(curl -fsS http://localhost/api/products)
          echo "$body" | head -c 300; echo
          echo "$body" | grep -q '"id"' || { echo "::error::/api/products 응답에 데이터 없음"; exit 1; }
          # /internal은 비노출 계약 (ADR-012)
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/internal/anything)
          [ "$code" = "404" ] || { echo "::error::/internal 노출됨 (HTTP $code)"; exit 1; }

      - name: NetworkPolicy 회귀 (G9 — 무라벨 파드 → shop-api 차단)
        # 미지원 CNI에선 정책이 조용히 무시되므로(ADR-014) 차단을 능동 검증한다
        run: |
          kubectl run np-check --rm -i --restart=Never -n mini-commerce --image=busybox:1.36 \
            --command -- sh -c 'nc -z -w 3 shop-api 8080 && exit 1 || exit 0'

      - name: 진단 덤프 (실패 시)
        if: failure()
        run: |
          kubectl get pods -A -o wide || true
          kubectl get events -n mini-commerce --sort-by=.lastTimestamp | tail -40 || true
          for d in shop-api order-api order-admin order-batch; do
            echo "=== deploy/$d 로그 ==="
            kubectl logs -n mini-commerce deploy/$d --tail=60 --all-containers || true
          done
          echo "=== orderdb-init 로그 ==="
          kubectl logs -n mini-commerce job/orderdb-init --tail=20 || true
          echo "=== kafka 상태 ==="
          kubectl get kafka,kafkanodepool -n mini-commerce -o wide || true
